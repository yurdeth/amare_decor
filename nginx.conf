# Configuración de nginx para Next.js en producción
# Guardar como: /etc/nginx/sites-available/amare-decor

server {
    listen 80;
    server_name tu-dominio.com www.tu-dominio.com;  # CAMBIAR por tu dominio

    # Redirigir HTTP a HTTPS (opcional, si usas SSL)
    # return 301 https://$server_name$request_uri;

    # O servir directamente en HTTP
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts para conexiones largas
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Archivos estáticos (opcional - Next.js los sirve)
    # location /_next/static {
    #     proxy_pass http://localhost:3000;
    #     proxy_cache_valid 200 365d;
    #     add_header Cache-Control "public, immutable";
    # }
}

